name: Build Viewer to gh-pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v3

      - name: Create _site directory and download character data
        run: |
          mkdir -p _site
          curl -o _site/character.json https://ww1.loping151.top/XutheringWavesUID/resource/map/CharId2Data.json
          curl -o _site/char_i18n.json https://ww1.loping151.top/XutheringWavesUID/resource/map/i18n/char_i18n.json

      - name: Generate index.json files
        run: |
          find . -mindepth 1 -maxdepth 1 -type d | while read dir; do
            cd "$dir"
            files=$(ls | grep -Ei '\.(png|jpe?g|webp|gif)$' | jq -R -s -c 'split("\n")[:-1]')
            echo "$files" > index.json
            cd ..
          done

      - name: Get folders
        id: get_folders
        run: |
          folders=$(ls -d [0-9]*/ 2>/dev/null | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "::set-output name=folders::$folders"

      - name: Create static viewer to _site
        run: |
          mkdir -p _site/js

          # index.html
          cat > _site/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Wuthering Waves Gallery</title>
            <link rel="stylesheet" href="style.css">
          </head>
          <body>
            <div id="header">
              <h1 id="title"></h1>
              <select id="langSelect" onchange="changeLang(this.value)">
                <option value="zh">中文</option>
                <option value="en">English</option>
              </select>
            </div>
            <ul id="folder-list"></ul>
            <script>
              // 国际化文本
              const i18n = {
                zh: {
                  title: "📁 xinghuan22 的鸣潮 bot 面板图",
                  loading: "加载中...",
                  error: "读取角色数据失败:"
                },
                en: {
                  title: "📁 xinghuan22's Wuthering Waves Bot Gallery",
                  loading: "Loading...",
                  error: "Failed to load character data:"
                }
              };

              function getChineseName(charInfo) {
                if (!charInfo) return null;
                const fields = ['name', 'Name', 'cn', 'zh', 'zhCN', 'zhHans', 'zh-Hans'];
                for (const field of fields) {
                  const value = charInfo[field];
                  if (typeof value === 'string' && value.trim()) {
                    return value;
                  }
                }
                return null;
              }

              function getEnglishName(charInfo) {
                if (!charInfo) return null;
                const fields = ['en', 'EN', 'name_en', 'NameEn', 'enUS', 'english'];
                for (const field of fields) {
                  const value = charInfo[field];
                  if (typeof value === 'string' && value.trim()) {
                    return value;
                  }
                }
                return null;
              }

              function getCharacterName(folderId, charData, charI18n, lang) {
                const charInfo = charData?.[folderId];
                const chineseName = getChineseName(charInfo);
                const i18nEntry = chineseName ? charI18n?.[chineseName] : null;

                if (lang === 'zh') {
                  return chineseName || getEnglishName(charInfo) || folderId;
                }

                if (lang === 'cht' && i18nEntry?.cht) {
                  return i18nEntry.cht;
                }

                return i18nEntry?.en || getEnglishName(charInfo) || chineseName || folderId;
              }

              // 获取浏览器语言
              let currentLang = navigator.language.startsWith('zh') ? 'zh' : 'en';
              document.getElementById('langSelect').value = currentLang;
              
              // 更新页面文本
              function updateTexts() {
                document.getElementById('title').innerText = i18n[currentLang].title;
              }

              // 切换语言
              function changeLang(lang) {
                currentLang = lang;
                updateTexts();
                loadGallery();
              }

              // 加载图库
              function loadGallery() {
                Promise.all([
                  fetch('character.json').then(r => r.json()),
                  fetch('char_i18n.json').then(r => r.json()).catch(() => ({}))
                ])
                  .then(([charData, charI18n]) => {
                    const folders = JSON.parse('${{ steps.get_folders.outputs.folders }}');
                    const baseUrl = "viewer.html?folder=";
                    const list = document.getElementById("folder-list");
                    list.innerHTML = ''; // 清空现有内容
                    
                    folders.forEach(f => {
                      const folderId = f.replace("/", "");
                      const charInfo = charData[folderId];
                      
                      if(charInfo) {
                        const li = document.createElement("li");
                        const charName = getCharacterName(folderId, charData, charI18n, currentLang);
                        li.innerHTML = \`<a href="\${baseUrl}\${folderId}&lang=\${currentLang}">\${charName} (\${folderId})</a>\`;
                        list.appendChild(li);
                      }
                    });
                  })
                  .catch(err => {
                    console.error(i18n[currentLang].error, err);
                    const folders = JSON.parse('${{ steps.get_folders.outputs.folders }}');
                    const baseUrl = "viewer.html?folder=";
                    const list = document.getElementById("folder-list");
                    list.innerHTML = '';
                    
                    folders.forEach(f => {
                      const name = f.replace("/", "");
                      const li = document.createElement("li");
                      li.innerHTML = \`<a href="\${baseUrl}\${name}&lang=\${currentLang}">📁 \${name}</a>\`;
                      list.appendChild(li);
                    });
                  });
              }

              // 初始化
              updateTexts();
              loadGallery();
            </script>
          </body>
          </html>
          EOF

          # viewer.html 修改
          cat > _site/viewer.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Image Viewer</title>
            <link rel="stylesheet" href="style.css">
          </head>
          <body>
            <div id="header">
              <a href="index.html" id="backLink"></a>
              <select id="langSelect" onchange="changeLang(this.value)">
                <option value="zh">中文</option>
                <option value="en">English</option>
              </select>
            </div>
            <h1 id="title"></h1>
            <div id="gallery"></div>
            <script>
              // 国际化文本
              const i18n = {
                zh: {
                  back: "返回主页",
                  loading: "加载中...",
                  folder: "📁 "
                },
                en: {
                  back: "Back to Home",
                  loading: "Loading...",
                  folder: "📁 "
                }
              };

              function getChineseName(charInfo) {
                if (!charInfo) return null;
                const fields = ['name', 'Name', 'cn', 'zh', 'zhCN', 'zhHans', 'zh-Hans'];
                for (const field of fields) {
                  const value = charInfo[field];
                  if (typeof value === 'string' && value.trim()) {
                    return value;
                  }
                }
                return null;
              }

              function getEnglishName(charInfo) {
                if (!charInfo) return null;
                const fields = ['en', 'EN', 'name_en', 'NameEn', 'enUS', 'english'];
                for (const field of fields) {
                  const value = charInfo[field];
                  if (typeof value === 'string' && value.trim()) {
                    return value;
                  }
                }
                return null;
              }

              function getCharacterName(folderId, charData, charI18n, lang) {
                const charInfo = charData?.[folderId];
                const chineseName = getChineseName(charInfo);
                const i18nEntry = chineseName ? charI18n?.[chineseName] : null;

                if (lang === 'zh') {
                  return chineseName || getEnglishName(charInfo) || folderId;
                }

                if (lang === 'cht' && i18nEntry?.cht) {
                  return i18nEntry.cht;
                }

                return i18nEntry?.en || getEnglishName(charInfo) || chineseName || folderId;
              }

              // 获取URL参数
              window.urlParams = new URLSearchParams(location.search);
              window.currentFolder = window.urlParams.get("folder");
              let currentLang = window.urlParams.get("lang") || (navigator.language.startsWith('zh') ? 'zh' : 'en');
              document.getElementById('langSelect').value = currentLang;

              // 更新页面文本
              function updateTexts() {
                document.getElementById('backLink').innerText = i18n[currentLang].back;
                document.getElementById('title').innerText = i18n[currentLang].loading;
              }

              // 切换语言
              function changeLang(lang) {
                currentLang = lang;
                updateTexts();
                loadCharacterInfo();
              }

              // 加载角色信息
              function loadCharacterInfo() {
                Promise.all([
                  fetch('character.json').then(r => r.json()),
                  fetch('char_i18n.json').then(r => r.json()).catch(() => ({}))
                ])
                  .then(([charData, charI18n]) => {
                    const charInfo = charData[window.currentFolder];
                    if(charInfo) {
                      const charName = getCharacterName(window.currentFolder, charData, charI18n, currentLang);
                      document.getElementById("title").innerText = i18n[currentLang].folder + charName;
                    } else {
                      document.getElementById("title").innerText = i18n[currentLang].folder + window.currentFolder;
                    }
                  })
                  .catch(() => {
                    document.getElementById("title").innerText = i18n[currentLang].folder + window.currentFolder;
                  });
              }

              // 初始化
              updateTexts();
              loadCharacterInfo();
            </script>
            <script src="js/render.js"></script>
          </body>
          </html>
          EOF

          # render.js 修改
          cat > _site/js/render.js <<EOF
          // 使用全局变量
          const gallery = document.getElementById("gallery");
          const base = \`https://raw.githubusercontent.com/\${location.hostname.split('.')[0]}/\${location.pathname.split('/')[1]}/gh-pages/\${window.currentFolder}/\`;

          fetch(\`\${base}index.json\`)
            .then(r => r.json())
            .then(images => {
              images.forEach(img => {
                const el = document.createElement("img");
                el.src = base + img;
                el.alt = img;
                el.style = "max-width:200px;margin:10px;border:1px solid #ccc;";
                gallery.appendChild(el);
              });
            });
          EOF

          # style.css
          cat > _site/style.css <<EOF
          body {
            font-family: sans-serif;
            padding: 20px;
            background: #f2f2f2;
          }
          img {
            max-width: 200px;
            margin: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
          }

          #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
          }

          #langSelect {
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
          }
          EOF

      - name: Copy image folders to _site
        run: |
          for dir in [0-9][0-9]*/; do
            cp -r "$dir" _site/
          done

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
